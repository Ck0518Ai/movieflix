<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>현재 상영 — MovieFlix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <a href="#" class="logo">MovieFlix</a>
      <nav class="nav">
        <a href="#" class="nav__link nav__link--active" data-tab="nowPlaying">현재 상영</a>
        <a href="#" class="nav__link" data-tab="popular">인기</a>
        <a href="#" class="nav__link" data-tab="newRelease">신작</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero" id="hero">
      <div class="hero__overlay"></div>
      <div class="hero__content">
        <p class="hero__badge">현재 상영</p>
        <h1 class="hero__title" id="hero-title">로딩 중...</h1>
        <div class="hero__meta" id="hero-meta" hidden>
          <span class="hero__date" id="hero-date"></span>
          <span class="hero__rating" id="hero-rating"></span>
        </div>
        <p class="hero__overview" id="hero-overview"></p>
      </div>
    </section>

    <section class="movies">
      <h2 class="movies__heading" id="movies-heading">현재 상영 중인 영화</h2>
      <div class="movies__grid" id="movie-list">
        <div class="loading" id="loading">
          <div class="loading__spinner"></div>
          <p>영화를 불러오는 중...</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 MovieFlix. TMDB API 제공.</p>
  </footer>

  <div class="paywall" id="paywall" hidden aria-hidden="true">
    <div class="paywall__backdrop" id="paywall-backdrop"></div>
    <div class="paywall__panel">
      <button class="paywall__close" id="paywall-close" type="button" aria-label="닫기">&times;</button>

      <div class="paywall__header">
        <img class="paywall__poster" id="paywall-poster" src="" alt="">
        <div>
          <p class="paywall__label">지금 시청하려면</p>
          <h2 class="paywall__title" id="paywall-title"></h2>
        </div>
      </div>

      <div class="paywall__stage">
        <div class="paywall__bubble">
          <p class="paywall__bubble-text">돈 주고 봐야지!!</p>
        </div>

        <div class="paywall__character" aria-hidden="true">
          <div class="character">
            <div class="character__arm character__arm--left"></div>
            <div class="character__arm character__arm--right"></div>
            <div class="character__body">
              <span class="character__eye character__eye--left"></span>
              <span class="character__eye character__eye--right"></span>
              <span class="character__mouth"></span>
            </div>
            <div class="character__leg character__leg--left"></div>
            <div class="character__leg character__leg--right"></div>
          </div>
        </div>
      </div>

      <button class="paywall__cta" type="button">구독하고 시청하기</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
